name: Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        if: github.ref_type == 'tag'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/release.keystore

      - name: Create local.properties
        run: |
          cd android
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build release APK
        if: github.ref_type == 'tag'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          cd android
          printf 'org.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8\norg.gradle.daemon=false\norg.gradle.workers.max=2\nandroid.useAndroidX=true\nkotlin.code.style=official\nandroid.nonTransitiveRClass=true\nandroid.suppressUnsupportedCompileSdk=36\n' > gradle.properties
          chmod +x gradlew
          ./gradlew assembleHermesRelease --no-daemon --no-build-cache

      - name: Build debug APK
        if: github.ref_type != 'tag'
        run: |
          cd android
          printf 'org.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8\norg.gradle.daemon=false\norg.gradle.workers.max=2\nandroid.useAndroidX=true\nkotlin.code.style=official\nandroid.nonTransitiveRClass=true\nandroid.suppressUnsupportedCompileSdk=36\n' > gradle.properties
          chmod +x gradlew
          ./gradlew assembleHermesDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-apk
          path: |
            android/app/build/outputs/apk/hermes/release/*.apk
            android/app/build/outputs/apk/hermes/debug/*.apk

  release:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: hermes-apk
          path: ./apk

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'versionName' android/app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create/Update Release Draft
        uses: release-drafter/release-drafter@v6
        with:
          tag: ${{ github.ref_name }}
          name: 'Hermes Messenger v${{ steps.version.outputs.version }}'
          header: |
            ### Установка
            1. Скачайте `hermes-release.apk` ниже
            2. В настройках Android разрешите установку из неизвестных источников
            3. Установите APK

            ### Серверная часть
            Инструкция: [docs/API.md](https://github.com/alXimik2700/hermes-client/blob/master/docs/API.md)
          append: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach APK to Release
        run: |
          find ./apk -name "*.apk" -exec gh release upload ${{ github.ref_name }} {} --clobber \;
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
