name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  server-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          cd server
          pip install -r requirements.txt
          pip install pytest
      
      - name: Run tests
        run: |
          cd server
          python -m pytest tests/ -v

  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Create local.properties
        run: |
          cd android
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "API_TOKEN=test" >> local.properties
          echo "SERVER_URL=http://localhost:5001" >> local.properties
      
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleHermesDebug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hermes-debug
          path: android/app/build/outputs/apk/hermes/debug/*.apk
